projects:
  - name: "Efficient AI Lab — CPU-first language-model systems"
    description: >
      An engineering laboratory for benchmarking, optimizing, and deploying
      small language models on commodity CPU infrastructure. Includes
      reproducible inference benchmarks, quantization experiments, Go/Python
      tooling, containerized deployment, observability, and architecture
      studies.
    highlights:
      - "Benchmarked latency, throughput, memory use, and quality across model and quantization configurations."
      - "Built reproducible local and containerized inference environments."
    url: "https://github.com/alessandrobessi/efficient-ai-lab"
    tech: ["Python", "Go", "llama.cpp", "Docker", "Kubernetes"]

books:
  - title: "Thinking in Packets: A Mental Model for Computer Networks"
    description: >
      An accessible introduction to computer networking for readers without a
      technical background, building understanding from the simplest
      networking problem up to modern internet infrastructure — covering
      signals, IP addressing, routing, DNS, encryption, HTTP, and cloud
      networking.
    url: "https://alessandrobessi.github.io/thinking-in-packets"
  - title: "Thinking in Tokens: A Mental Model for Modern AI Systems"
    description: >
      A conceptual introduction to modern AI for curious readers without a
      math or programming background, explaining tokens, embeddings,
      transformers, and hallucination as one cumulative mental model rather
      than a list of disconnected techniques.
    url: "https://alessandrobessi.github.io/thinking-in-tokens"
